<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:description" content="Every breakdown. Every cringe. Every 'why me.' Browse the gallery.">

<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a08;--cream:#f5f0e8;--yellow:#f5d84a;
  --orange:#f07a3a;--red:#e03a2a;--blue:#3a6ef0;--green:#2abf6e;
  --muted:#8a8a80;
  --fd:'Bebas Neue',sans-serif;
  --fs:'Instrument Serif',serif;
  --fb:'DM Sans',sans-serif;
  --fm:'Courier New',monospace;
}
html,body{min-height:100%}
body{background:var(--black);color:var(--cream);font-family:var(--fb);overflow-x:hidden;cursor:none}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:900;opacity:.3}
 
.cursor{position:fixed;width:16px;height:16px;background:var(--yellow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference}
.cursor.big{width:50px;height:50px}
 
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid rgba(245,240,232,.06);background:rgba(10,10,8,.88);backdrop-filter:blur(12px)}
.nav-logo{font-family:var(--fd);font-size:24px;letter-spacing:2px;color:var(--cream);text-decoration:none}
.nav-logo span{color:var(--orange)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;cursor:none}
.nav-link:hover{color:var(--cream)}
.nav-cta{background:var(--orange);color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:100px;text-decoration:none;transition:background .2s;cursor:none}
.nav-cta:hover{background:var(--red)}
 
/* HERO */
.hero{padding:140px 40px 50px;position:relative;overflow:hidden}
.hero-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fd);font-size:clamp(160px,24vw,300px);color:transparent;-webkit-text-stroke:1px rgba(245,240,232,.04);pointer-events:none;white-space:nowrap;line-height:1;animation:bgFloat 10s ease-in-out infinite}
@keyframes bgFloat{0%,100%{transform:translate(-50%,-50%) rotate(-1deg)}50%{transform:translate(-50%,-52%) rotate(1deg)}}
.hero-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.hero h1{font-family:var(--fd);font-size:clamp(60px,10vw,130px);line-height:.9;letter-spacing:2px;margin-bottom:14px}
.hero h1 em{font-family:var(--fs);font-style:italic;color:var(--orange)}
.hero-sub{font-family:var(--fs);font-style:italic;font-size:17px;color:rgba(245,240,232,.4);margin-bottom:20px}
.hero-stats{display:flex;gap:16px;flex-wrap:wrap}
.hero-stat{display:inline-flex;align-items:center;gap:8px;background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.1);border-radius:100px;padding:7px 16px;font-size:13px;color:rgba(245,240,232,.5);font-family:var(--fm)}
.hero-stat strong{color:var(--yellow)}
 
/* FILTERS */
.filter-bar{position:sticky;top:72px;z-index:50;background:rgba(10,10,8,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(245,240,232,.06);padding:14px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-btn{background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.1);border-radius:100px;padding:8px 18px;font-size:13px;color:rgba(245,240,232,.5);cursor:none;transition:all .2s;font-family:var(--fb)}
.filter-btn:hover{border-color:rgba(245,240,232,.2);color:var(--cream)}
.filter-btn.active{background:var(--cream);color:var(--black);border-color:var(--cream);font-weight:500}
.filter-btn.f-s.active{background:var(--orange);color:white;border-color:var(--orange)}
.filter-btn.f-u.active{background:var(--blue);color:white;border-color:var(--blue)}
.filter-btn.f-r.active{background:var(--red);color:white;border-color:var(--red)}
.filter-btn.f-sad.active{background:var(--green);color:white;border-color:var(--green)}
.sep{width:1px;height:22px;background:rgba(245,240,232,.1);margin:0 2px;flex-shrink:0}
.sort-btn{background:transparent;border:none;font-size:13px;color:rgba(245,240,232,.35);cursor:none;transition:color .2s;font-family:var(--fb);padding:8px 10px}
.sort-btn:hover,.sort-btn.active{color:var(--cream)}
 
/* GRID */
.gallery-wrap{padding:32px 40px 80px}
.gallery-grid{columns:3 280px;gap:20px}
 
/* CARD */
.melt-card{break-inside:avoid;margin-bottom:20px;animation:cardIn .4s both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.melt-card-inner{background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.09);border-radius:16px;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s}
.melt-card-inner:hover{border-color:rgba(245,240,232,.2);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.35)}
 
/* Mini comic */
.mini-comic{background:white;display:grid}
.mini-comic.p3{grid-template-columns:2fr 1fr 1fr}
.mini-comic.p2{grid-template-columns:1fr 1fr}
.mini-panel{border-right:1.5px solid #ddd;display:flex;flex-direction:column;min-height:110px}
.mini-panel:last-child{border-right:none}
.mini-panel-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:30px;padding:10px 4px}
.mini-panel-cap{background:#0a0a08;color:#f5d84a;font-family:'Courier New',monospace;font-size:7px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px;padding:5px 7px;line-height:1.3}
 
/* Card body */
.melt-card-body{padding:14px 16px 12px}
.card-mood{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.card-title{font-family:var(--fd);font-size:17px;letter-spacing:.5px;line-height:1.1;margin-bottom:6px;color:var(--cream)}
.card-situation{font-size:12px;color:rgba(245,240,232,.38);line-height:1.5;font-family:var(--fs);font-style:italic;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-time{font-size:10px;color:rgba(245,240,232,.18);font-family:var(--fm)}
 
/* Reactions */
.reactions{display:flex;gap:5px}
.rxn{display:flex;align-items:center;gap:4px;background:rgba(245,240,232,.05);border:1px solid rgba(245,240,232,.08);border-radius:100px;padding:4px 9px;font-size:12px;color:rgba(245,240,232,.4);cursor:none;transition:all .2s}
.rxn:hover{background:rgba(245,240,232,.1);color:var(--cream);transform:scale(1.05)}
.rxn.on{background:rgba(245,216,74,.12);border-color:rgba(245,216,74,.3);color:var(--yellow)}
.rxn-count{font-size:10px;font-family:var(--fm)}
 
/* EMPTY */
.empty{text-align:center;padding:80px 40px}
.empty-emoji{font-size:80px;display:block;margin-bottom:20px;animation:emptyWobble 3s ease-in-out infinite}
@keyframes emptyWobble{0%,100%{transform:rotate(-5deg) scaleY(1)}50%{transform:rotate(5deg) scaleY(1.1)}}
.empty h2{font-family:var(--fd);font-size:48px;letter-spacing:1px;margin-bottom:10px}
.empty p{font-family:var(--fs);font-style:italic;color:rgba(245,240,232,.4);font-size:18px;margin-bottom:28px}
.btn-go{background:var(--orange);color:white;font-family:var(--fd);font-size:22px;letter-spacing:1px;padding:16px 40px;border-radius:100px;text-decoration:none;transition:background .2s,transform .15s;display:inline-flex;align-items:center;gap:10px}
.btn-go:hover{background:var(--red);transform:translateY(-2px)}
 
/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--cream);color:var(--black);padding:14px 28px;border-radius:100px;font-family:var(--fb);font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.3);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:500}
.toast.show{transform:translateX(-50%) translateY(0)}
 
@media(hover:none){body{cursor:auto}.cursor{display:none}}
 
@media(max-width:768px){
  nav{padding:14px 16px}
  .nav-link{font-size:12px}
  .nav-cta{font-size:12px;padding:8px 14px}
  .hero{padding:110px 20px 36px}
  .hero h1{font-size:clamp(52px,14vw,90px)}
  .hero-sub{font-size:16px}
  .hero-stats{gap:12px;flex-wrap:wrap}
  .filter-bar{padding:10px 16px;top:60px;gap:6px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .filter-btn{white-space:nowrap;flex-shrink:0;padding:7px 14px;font-size:12px}
  .sort-sep{display:none}
  .sort-btn{font-size:12px;flex-shrink:0}
  .gallery-wrap{padding:20px 14px 60px}
  .gallery-grid{columns:1}
  .card-title{font-size:15px}
  .mini-panel{min-height:88px}
  .mini-panel-art{font-size:24px}
  .empty h2{font-size:36px}
  .toast{font-size:13px;padding:12px 18px;bottom:16px;max-width:88vw;text-align:center;white-space:normal}
}
@media(max-width:400px){
  .hero h1{font-size:13vw}
  .nav-cta{display:none}
}
</style>
</head>
<body>
 
<div class="cursor" id="cursor"></div>
 
<nav>
  <a class="nav-logo" href="index.html">MELT<span>ING</span></a>
  <div class="nav-right">
    <a class="nav-link" href="index.html">← Home</a>
    <a class="nav-cta" href="generator.html">+ New melt</a>
  </div>
</nav>
 
<section class="hero">
  <div class="hero-bg">WALL</div>
  <p class="hero-tag">The gallery</p>
  <h1>THE WALL<br>OF <em>MELTS</em></h1>
  <p class="hero-sub">Every breakdown. Every cringe. Every "why me."</p>
  <div class="hero-stats">
    <div class="hero-stat"><strong id="total-count">0</strong> melts</div>
    <div class="hero-stat"><strong id="hot-count">0</strong> reactions today</div>
  </div>
</section>
 
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All melts</button>
  <button class="filter-btn f-s"   onclick="setFilter('STRESSED',this)">😤 Stressed</button>
  <button class="filter-btn f-u"   onclick="setFilter('UNHINGED',this)">🤯 Unhinged</button>
  <button class="filter-btn f-r"   onclick="setFilter('RANT MODE',this)">💥 Rant mode</button>
  <button class="filter-btn f-sad" onclick="setFilter('SAD BUT FUNNY',this)">😂 Sad but funny</button>
  <div class="sep"></div>
  <button class="sort-btn active" id="sort-new" onclick="setSort('new',this)">Newest</button>
  <button class="sort-btn"        id="sort-hot" onclick="setSort('hot',this)">🔥 Hottest</button>
</div>
 
<div class="gallery-wrap">
  <div class="gallery-grid" id="gallery-grid"></div>
  <div class="empty" id="empty-state" style="display:none">
    <span class="empty-emoji">🫠</span>
    <h2>NO MELTS YET</h2>
    <p>Be the first to break down beautifully.</p>
    <a class="btn-go" href="generator.html">🫠 Start melting</a>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
// CURSOR
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
function bindCursor() {
  document.querySelectorAll('a,button,.melt-card-inner').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });
}
bindCursor();
 
// STORAGE
const STORAGE_KEY = 'melting_gallery';
function getMelts() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];} }
function saveMelts(m) { localStorage.setItem(STORAGE_KEY, JSON.stringify(m)); }
 
// SEED demo data if empty
function seedIfEmpty() {
  if (getMelts().length) return;
  const demos = [
    {id:'d1',mood:'STRESSED',moodColor:'#f07a3a',moodBg:'rgba(240,122,58,0.12)',title:'TECHNICAL DIFFICULTIES: EMOTIONAL EDITION',situation:'My WiFi died 5 minutes before my job interview',panels:[{emoji:'🧑‍💻',bg:'#fffbea',caption:'FAMOUS LAST WORDS.'},{emoji:'📶❌',bg:'#fff4ea',caption:'OH. NO.'},{emoji:'🫠',bg:'#ffeaea',caption:'THIS IS NOT FINE.'}],reactions:{fire:14,skull:8,cry:6},ts:Date.now()-3600000*2},
    {id:'d2',mood:'UNHINGED',moodColor:'#3a6ef0',moodBg:'rgba(58,110,240,0.12)',title:'SOCIAL CONTRACT: VIOLATED',situation:'I said "you too" when the waiter said enjoy your meal',panels:[{emoji:'😌',bg:'#eaf4ff',caption:'CONFIDENT. CAPABLE.'},{emoji:'🫣',bg:'#dfeeff',caption:'THE POINT OF NO RETURN.'},{emoji:'🏃',bg:'#d0e4ff',caption:'LEAVING THE COUNTRY NOW.'}],reactions:{fire:22,skull:15,cry:9},ts:Date.now()-3600000*5},
    {id:'d3',mood:'RANT MODE',moodColor:'#e03a2a',moodBg:'rgba(224,58,42,0.12)',title:'THE AUDACITY. THE ABSOLUTE AUDACITY.',situation:'My boss scheduled a meeting that could have been an email',panels:[{emoji:'😤',bg:'#fff4f0',caption:'A REASONABLE REQUEST.'},{emoji:'🤡',bg:'#ffe8e0',caption:'ENTER: THE CHAOS GOBLIN.'},{emoji:'💅',bg:'#ffd0c0',caption:'UNBOTHERED. (VERY BOTHERED.)'}],reactions:{fire:31,skull:4,cry:12},ts:Date.now()-3600000*8},
    {id:'d4',mood:'SAD BUT FUNNY',moodColor:'#2abf6e',moodBg:'rgba(42,191,110,0.12)',title:'HOPE: A CAUTIONARY TALE',situation:"My alarm didn't go off and I have absolutely no explanation",panels:[{emoji:'🙂',bg:'#eafff0',caption:'SPOILER: IT WAS NOT.'},{emoji:'😶',bg:'#d4f5e2',caption:'THE UNIVERSE HAD PLANS.'},{emoji:'😂',bg:'#b8f0d0',caption:"IT'S FUNNY BECAUSE IT'S TRUE."}],reactions:{fire:18,skull:11,cry:27},ts:Date.now()-3600000*12},
    {id:'d5',mood:'STRESSED',moodColor:'#f07a3a',moodBg:'rgba(240,122,58,0.12)',title:'ONE PERSON. TOO MANY PROBLEMS.',situation:'My code worked and I genuinely have no idea why',panels:[{emoji:'☕',bg:'#fffbea',caption:'THE CALM BEFORE THE STORM.'},{emoji:'💻💥',bg:'#fff4ea',caption:'AND THERE IT IS.'},{emoji:'🙃',bg:'#ffeaea',caption:'COPING MECHANISM ACTIVATED.'}],reactions:{fire:41,skull:33,cry:19},ts:Date.now()-3600000*20},
    {id:'d6',mood:'UNHINGED',moodColor:'#3a6ef0',moodBg:'rgba(58,110,240,0.12)',title:'BRAIN TAKES THE DAY OFF',situation:'I waved back at someone who was not waving at me',panels:[{emoji:'😇',bg:'#eaf4ff',caption:'INNOCENT. UNSUSPECTING.'},{emoji:'😬',bg:'#dfeeff',caption:'THE LOOK ON THEIR FACE.'},{emoji:'🛌',bg:'#d0e4ff',caption:'THE BED IS HOME.'}],reactions:{fire:55,skull:28,cry:34},ts:Date.now()-3600000*30},
  ];
  saveMelts(demos);
}
 
// STATE
let currentFilter='all', currentSort='new';
let reacted = JSON.parse(localStorage.getItem('melting_reacted')||'{}');
 
function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSort(s,btn) {
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
 
function timeAgo(ts) {
  const d=Date.now()-ts, m=Math.floor(d/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
 
function totalRxn(r) { return (r.fire||0)+(r.skull||0)+(r.cry||0); }
 
function render() {
  let melts=getMelts();
  const all=melts;
 
  if(currentFilter!=='all') melts=melts.filter(m=>m.mood===currentFilter);
  if(currentSort==='hot') melts=[...melts].sort((a,b)=>totalRxn(b.reactions)-totalRxn(a.reactions));
  else melts=[...melts].sort((a,b)=>b.ts-a.ts);
 
  // stats
  document.getElementById('total-count').textContent=all.length;
  const todayRxns=all.reduce((s,m)=>s+totalRxn(m.reactions),0);
  document.getElementById('hot-count').textContent=todayRxns;
 
  const grid=document.getElementById('gallery-grid');
  const empty=document.getElementById('empty-state');
 
  if(!melts.length) { grid.style.display='none'; empty.style.display='block'; return; }
  grid.style.display=''; empty.style.display='none';
  grid.innerHTML='';
 
  melts.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='melt-card';
    card.style.animationDelay=(i*.04)+'s';
 
    const r=reacted[m.id]||{};
    const panels=m.panels.map(p=>`
      <div class="mini-panel" style="background:${p.bg}">
        <div class="mini-panel-art">${p.emoji}</div>
        <div class="mini-panel-cap">${p.caption}</div>
      </div>`).join('');
 
    card.innerHTML=`
      <div class="melt-card-inner">
        <div class="mini-comic p${m.panels.length}">${panels}</div>
        <div class="melt-card-body">
          <div class="card-mood" style="background:${m.moodBg};color:${m.moodColor};border:1px solid ${m.moodColor}44">${m.mood}</div>
          <div class="card-title">${m.title}</div>
          <div class="card-situation">"${m.situation}"</div>
          <div class="card-footer">
            <div class="reactions">
              <button class="rxn ${r.fire?'on':''}" data-id="${m.id}" data-type="fire">🔥 <span class="rxn-count">${m.reactions.fire||0}</span></button>
              <button class="rxn ${r.skull?'on':''}" data-id="${m.id}" data-type="skull">💀 <span class="rxn-count">${m.reactions.skull||0}</span></button>
              <button class="rxn ${r.cry?'on':''}" data-id="${m.id}" data-type="cry">😂 <span class="rxn-count">${m.reactions.cry||0}</span></button>
            </div>
            <div class="card-time">${timeAgo(m.ts)}</div>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
 
  // bind reactions via delegation
  grid.querySelectorAll('.rxn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=btn.dataset.id, type=btn.dataset.type;
      react(id,type,btn);
    });
  });
 
  bindCursor();
}
 
function react(id,type,btn) {
  const melts=getMelts();
  const m=melts.find(x=>x.id===id);
  if(!m) return;
  if(!reacted[id]) reacted[id]={};
  const countEl=btn.querySelector('.rxn-count');
 
  if(reacted[id][type]) {
    m.reactions[type]=Math.max(0,(m.reactions[type]||0)-1);
    delete reacted[id][type];
    btn.classList.remove('on');
  } else {
    m.reactions[type]=(m.reactions[type]||0)+1;
    reacted[id][type]=true;
    btn.classList.add('on');
    btn.style.transform='scale(1.3)';
    setTimeout(()=>btn.style.transform='',180);
  }
  countEl.textContent=m.reactions[type];
  saveMelts(melts);
  localStorage.setItem('melting_reacted',JSON.stringify(reacted));
}
 
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
 
// INIT
seedIfEmpty();
render();
 
// Live updates when generator saves
window.addEventListener('storage', e=>{ if(e.key===STORAGE_KEY) render(); });
</script>
</body>
</html>
